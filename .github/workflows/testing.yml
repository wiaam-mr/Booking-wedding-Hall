name: CI Auto Test
on:
  push:
    branches: [ SCRUM-1-login-page, main, SCRUM-4-show-hall ]
  pull_request:
    branches: [ main ]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3

      - name: Check Essential Files
        run: |
          ls login.html
          ls show.html

      - name: Validate Login HTML Structure
        run: |
          grep -q "username" login.html
          grep -q "password" login.html
          echo "Login Logic Check: Essential login fields are present."

      - name: Validate Show Halls HTML Structure
        run: |
          grep -q "hall-card\|halls-list" show.html
          grep -q "View Details" show.html
          echo "Show Halls Logic Check: Essential elements are present."
