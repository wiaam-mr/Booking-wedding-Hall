<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Halls - Damascus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe4e9 100%);
            padding: 50px 20px;
            min-height: 100vh;
        }

        /* Main container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header with romantic decoration */
        .header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }

        .header h1 {
            font-size: 3rem;
            color: #d46b8c;
            letter-spacing: 2px;
            text-shadow: 2px 2px 8px rgba(212, 107, 140, 0.2);
        }

        .header p {
            color: #b8889a;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .divider {
            width: 80px;
            height: 3px;
            background: #f0a6b5;
            margin: 15px auto 0;
            border-radius: 5px;
        }

        /* Halls list layout */
        .halls-list {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* Hall card with hover animation */
        .hall-card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 10px 30px rgba(212, 107, 140, 0.15);
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 25px;
            padding: 25px;
            cursor: pointer;
            border: 1px solid rgba(240, 166, 181, 0.3);
        }

        .hall-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(212, 107, 140, 0.25);
            border-color: #f0a6b5;
        }

        /* Hall Image with frame effect */
        .hall-image {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 20px;
            background: #fce4e8;
            transition: transform 0.3s ease;
        }

        .hall-card:hover .hall-image {
            transform: scale(1.02);
        }

        /* Hall info section */
        .hall-info {
            flex: 1;
        }

        .hall-name {
            font-size: 1.8rem;
            font-weight: 600;
            color: #c45a7a;
            margin-bottom: 8px;
        }

        /* View Details button */
        .details-btn {
            background: linear-gradient(135deg, #d46b8c, #c45a7a);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            box-shadow: 0 4px 10px rgba(212, 107, 140, 0.3);
        }

        .details-btn:hover {
            background: linear-gradient(135deg, #e07a9a, #d46b8c);
            transform: scale(1.02);
            box-shadow: 0 6px 15px rgba(212, 107, 140, 0.4);
        }

        /* Extra details section (appears on click) */
        .extra-details {
            margin-top: 18px;
            padding: 15px 18px;
            background: #fff8f9;
            border-radius: 18px;
            display: none;
            border-left: 4px solid #d46b8c;
            animation: fadeIn 0.3s ease;
        }

        .extra-details.show {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .extra-details p {
            margin: 10px 0;
            font-size: 1rem;
            color: #5a4a50;
        }

        .extra-details strong {
            color: #c45a7a;
            font-weight: 600;
        }

        /* No halls message */
        .no-halls {
            text-align: center;
            font-size: 1.6rem;
            color: #d46b8c;
            padding: 70px 25px;
            background: white;
            border-radius: 35px;
            box-shadow: 0 8px 25px rgba(212, 107, 140, 0.1);
            border: 1px dashed #f0a6b5;
        }

        /* Flower decoration */
        .flower-decoration {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 2rem;
            opacity: 0.5;
            pointer-events: none;
        }

        /* Responsive design */
        @media (max-width: 750px) {
            .hall-card {
                flex-direction: column;
                text-align: center;
                padding: 20px;
            }
            
            .hall-image {
                width: 100%;
                height: 220px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💗 Wedding Halls 💗</h1>
            <p>Discover the most beautiful wedding venues in Damascus, Syria</p>
            <div class="divider"></div>
        </div>

        <div id="hallsContainer" class="halls-list">
            <!-- Halls will be displayed here via JavaScript -->
        </div>
    </div>
    <div class="flower-decoration">🌸🌹💐</div>

    <script>
        // Halls Data according to your requirements
        const hallsData = [
            {
                name: "Cheval Hall",
                image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRygC5mf8fG4tSpzfETLGRql4d5yDOVN7N8cA&s",
                location: "Damascus - Al-Mazzeh Boulevard, near Four Seasons Hotel",
                price: "12,000,000 SYP",
                maxGuests: "350 guests"
            },
            {
                name: "Al-Bahiya Hall",
                image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSbIQ_39NZsy1j35ZlyVNT7uv_gOi7Vuy_frg&s",
                location: "Damascus - Al-Rawda District, behind Al-Fayhaa Stadium",
                price: "15,000,000 SYP",
                maxGuests: "450 guests"
            },
            {
                name: "Al-Yasmeen Hall",
                image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT9NnpcG7_Q0vWpBXJbEMC3hahF_TL7uJJmsA&s",
                location: "Damascus - Al-Salihiya, near Al-Rabwa",
                price: "10,000,000 SYP",
                maxGuests: "280 guests"
            }
        ];

        const container = document.getElementById('hallsContainer');

        function displayHalls() {
            container.innerHTML = '';

            // If no halls available
            if (hallsData.length === 0) {
                container.innerHTML = '<div class="no-halls">🌸 No wedding halls available at the moment. Check back soon! 🌸</div>';
                return;
            }

            // Display all halls in list layout
            hallsData.forEach((hall, index) => {
                const card = document.createElement('div');
                card.className = 'hall-card';
                
                // Image
                const img = document.createElement('img');
                img.src = hall.image;
                img.alt = hall.name;
                img.className = 'hall-image';
                
                // Info section
                const infoDiv = document.createElement('div');
                infoDiv.className = 'hall-info';
                
                // Hall name
                const nameElem = document.createElement('h2');
                nameElem.className = 'hall-name';
                nameElem.textContent = hall.name;
                
                // View Details button
                const btn = document.createElement('button');
                btn.textContent = '💍 View Details 💍';
                btn.className = 'details-btn';
                
                // Extra details container
                const detailsDiv = document.createElement('div');
                detailsDiv.className = 'extra-details';
                detailsDiv.id = `details-${index}`;
                detailsDiv.innerHTML = `
                    <p><strong>📍 Location:</strong> ${hall.location}</p>
                    <p><strong>💰 Price:</strong> ${hall.price}</p>
                    <p><strong>👥 Max Capacity:</strong> ${hall.maxGuests}</p>
                    <p><strong>✨ Features:</strong> Bridal suite, parking, catering services</p>
                `;
                
                // Toggle details on button click
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    document.querySelectorAll('.extra-details').forEach(detail => {
                        if (detail !== detailsDiv) {
                            detail.classList.remove('show');
                        }
                    });
                    detailsDiv.classList.toggle('show');
                });
                
                infoDiv.appendChild(nameElem);
                infoDiv.appendChild(btn);
                infoDiv.appendChild(detailsDiv);
                
                card.appendChild(img);
                card.appendChild(infoDiv);
                container.appendChild(card);
            });
        }

        displayHalls();
    </script>
</body>
</html>
